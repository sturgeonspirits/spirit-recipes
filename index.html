<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sturgeon Spirits — Recipe Book</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="top">
  <h1>Sturgeon Spirits — Recipe &amp; TTB Tracker</h1>
  <a href="https://github.com/" target="_blank" rel="noopener">Source on GitHub</a>
</header>
<main>
  <div id="demo-banner" class="demo-banner" style="display:none">
    Running in local demo mode against <code>data/seed.json</code> — read-only. Add your Apps Script
    URL to <code>js/config.js</code> to connect the live Google Sheet and enable editing/saving.
  </div>

  <div class="controls">
    <input type="text" id="search" placeholder="Search recipes...">
    <select id="category-filter"><option value="">All categories</option></select>
    <select id="ttb-filter">
      <option value="">All TTB statuses</option>
      <option value="has_formula">Has formula #</option>
      <option value="no_formula">Missing formula #</option>
      <option value="has_label">Has label/COLA #</option>
      <option value="detailed">Has ingredient detail</option>
    </select>
    <button class="secondary" id="export-all">Export catalog to CSV</button>
    <span id="result-count" class="muted" style="margin-left:auto"></span>
  </div>

  <table>
    <thead>
      <tr><th>Recipe</th><th>Category</th><th>ABV</th><th>TTB Formula #</th><th>TTB Label / COLA #</th><th>Last Approved</th></tr>
    </thead>
    <tbody id="recipe-rows"><tr><td colspan="6">Loading…</td></tr></tbody>
  </table>
</main>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/abv.js"></script>
<script src="js/export.js"></script>
<script src="js/app.js"></script>
</body>
</html>
