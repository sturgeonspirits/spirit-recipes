<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sturgeon Spirits — Recipe Book</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#3B5B45">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="top">
  <h1>Sturgeon Spirits</h1>
</header>
<main>
  <div id="demo-banner" class="demo-banner" style="display:none">
    Demo mode — read-only. Add your Apps Script URL to <code>js/config.js</code> to enable editing.
  </div>

  <div class="search-bar">
    <input type="text" id="search" placeholder="Search recipes…" autocomplete="off">
  </div>

  <div class="filters">
    <select id="category-filter"><option value="">All categories</option></select>
    <select id="ttb-filter">
      <option value="">All TTB statuses</option>
      <option value="has_formula">Has formula #</option>
      <option value="no_formula">Missing formula #</option>
      <option value="has_label">Has label/COLA #</option>
      <option value="detailed">Has ingredient detail</option>
    </select>
    <label class="alc-toggle" id="ingredients-toggle-label">
      <input type="checkbox" id="ingredients-toggle">
      <span class="dot"></span>
      With ingredients
    </label>
    <label class="alc-toggle" id="no-ingredients-toggle-label">
      <input type="checkbox" id="no-ingredients-toggle">
      <span class="dot"></span>
      Without ingredients
    </label>
    <button class="secondary" id="export-all">Export CSV</button>
  </div>

  <div id="result-count" class="result-count"></div>

  <div id="recipe-rows" class="recipe-list">
    <div class="empty-state">Loading…</div>
  </div>
</main>
<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/abv.js"></script>
<script src="js/export.js"></script>
<script src="js/app.js"></script>
</body>
</html>
