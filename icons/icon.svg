<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b2f33"/>
      <stop offset="1" stop-color="#16181a"/>
    </linearGradient>
    <linearGradient id="copperV" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7a3a11"/>
      <stop offset="0.22" stop-color="#c9762f"/>
      <stop offset="0.45" stop-color="#f6c390"/>
      <stop offset="0.62" stop-color="#e59a55"/>
      <stop offset="1" stop-color="#7a3a11"/>
    </linearGradient>
    <linearGradient id="copperPipe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6c390"/>
      <stop offset="1" stop-color="#b5601f"/>
    </linearGradient>
    <linearGradient id="copper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e59a55"/>
      <stop offset="1" stop-color="#8a4415"/>
    </linearGradient>
    <radialGradient id="drop" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#ffe6c4"/>
      <stop offset="1" stop-color="#c9762f"/>
    </radialGradient>
  </defs>

  <!-- background tile -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="8" y="8" width="496" height="496" rx="106" fill="none" stroke="#d98543" stroke-opacity="0.28" stroke-width="4"/>

  <!-- swan-neck lyne arm rising from the pot's neck, bending over to the condenser -->
  <path d="M206 168
           C206 120 252 112 300 128
           C350 145 384 172 384 226
           L384 300"
        fill="none" stroke="url(#copperPipe)" stroke-width="30" stroke-linecap="round"/>
  <!-- descending condenser spout -->
  <path d="M384 300 L384 336" fill="none" stroke="url(#copperPipe)" stroke-width="20" stroke-linecap="round"/>

  <!-- distillate drop -->
  <path d="M384 402
           c-16 0 -26 -18 -18 -33
           c5 -9 13 -18 18 -27
           c5 9 13 18 18 27
           c8 15 -2 33 -18 33 z"
        fill="url(#drop)"/>

  <!-- collection cup -->
  <path d="M352 410 h64 l-9 42 a23 11 0 0 1 -46 0 z" fill="url(#copper)"/>
  <ellipse cx="384" cy="410" rx="32" ry="9" fill="#8a4415"/>

  <!-- furnace base / stand -->
  <path d="M150 408 h140 l20 40 h-180 z" fill="#8a4415"/>
  <rect x="120" y="444" width="180" height="20" rx="8" fill="#5f2d0d"/>

  <!-- pot still boiler: bulbous pear tapering up into the neck -->
  <path d="M210 150
           C236 150 236 176 232 202
           C226 236 302 250 302 320
           C302 382 262 420 210 420
           C158 420 118 382 118 320
           C118 250 194 236 188 202
           C184 176 184 150 210 150 Z"
        fill="url(#copperV)"/>

  <!-- neck collar -->
  <rect x="184" y="150" width="52" height="16" rx="8" fill="url(#copper)"/>

  <!-- vertical specular highlight -->
  <path d="M170 250 C150 300 156 356 186 402" fill="none" stroke="#ffe6c4" stroke-opacity="0.38" stroke-width="13" stroke-linecap="round"/>

  <!-- manway hatch (characteristic pot-still door) -->
  <circle cx="210" cy="352" r="26" fill="none" stroke="#7a3a11" stroke-opacity="0.6" stroke-width="7"/>
  <circle cx="210" cy="352" r="5" fill="#7a3a11" fill-opacity="0.6"/>
</svg>
